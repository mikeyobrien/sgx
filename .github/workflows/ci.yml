# ABOUTME: GitHub Actions CI for sgx — runs tests, lint, and type checking on every push and PR

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Run ruff (lint + format check)
      run: uv run --python ${{ matrix.python-version }} ruff check . && uv run --python ${{ matrix.python-version }} ruff format --check .

    - name: Run mypy
      run: uv run --python ${{ matrix.python-version }} mypy src/sgx

    - name: Run tests
      run: uv run --python ${{ matrix.python-version }} pytest
